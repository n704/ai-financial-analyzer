# Scaled override — layer on top of the base file:
#   docker compose -f docker-compose.yml -f docker-compose.scaled.yml up --build
#
# Switches the app to the scaled profile (Postgres + pgvector, Redis-backed
# cache/queue/events, S3 storage) and adds a separate worker process.
services:
  api:
    environment:
      APP_CONFIG: config/scaled.yaml
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/analyzer
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
      minio: {condition: service_started}

  worker:
    build: .
    command: ["worker"]
    environment:
      APP_CONFIG: config/scaled.yaml
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/analyzer
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: analyzer
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d analyzer"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]

volumes:
  pg_data:
  minio_data:
