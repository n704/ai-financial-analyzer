# Same as config/test.yaml but with its own data directory, so the documents
# API test module (tests/unit/test_documents_api.py) doesn't share SQLite/
# Chroma/storage state with other test modules that also boot the full app.

llm:
  provider: fake
  model: fake-llm

embeddings:
  provider: fake
  model: fake-embedding

vector_store:
  provider: chroma
  path: ./data/test_documents/chroma
  collection: chunks_test

database:
  url: sqlite:///./data/test_documents/app.db

cache:
  backend: memory

queue:
  backend: inprocess

events:
  backend: inprocess

object_storage:
  provider: local
  path: ./data/test_documents/pdfs

chunking:
  target_tokens: 800
  overlap_tokens: 100

limits:
  max_upload_mb: 30
  max_pages: 600
  max_compare_docs: 5
  quotas:
    documents: 100
    uploads_per_day: 20
    questions_per_day: 200
