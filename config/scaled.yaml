# Scaled profile — horizontal scaling: Postgres + pgvector, Redis-backed
# cache/queue/events, S3 storage, a separate worker process. Same application code;
# only these backend choices differ from config/dev.yaml.

llm:
  provider: gemini
  model: gemini-2.5-flash
  api_key_env: GEMINI_API_KEY
  options:
    max_output_tokens: 16000

embeddings:
  provider: gemini
  model: gemini-embedding-001
  api_key_env: GEMINI_API_KEY

vector_store:
  provider: pgvector          # reuses database.url

database:
  url: ${DATABASE_URL}        # postgresql+psycopg://...

cache:
  backend: redis
  url: ${REDIS_URL}

queue:
  backend: arq                # Redis-backed; ingestion runs in the worker process
  url: ${REDIS_URL}

events:
  backend: redis
  url: ${REDIS_URL}

object_storage:
  provider: s3
  bucket: reports
  endpoint_env: S3_ENDPOINT

chunking:
  target_tokens: 800
  overlap_tokens: 100

limits:
  max_upload_mb: 30
  max_pages: 600
  max_compare_docs: 5
  quotas:
    documents: 100
    uploads_per_day: 20
    questions_per_day: 200
